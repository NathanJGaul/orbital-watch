server { # Start server block definition
  listen 80; # Listen on port 80

  location / { # Location block for root path
    root /usr/share/nginx/html; # Set root directory to /usr/share/nginx/html
    try_files $uri $uri/ /index.html; # Try the requested URI as file, then as directory, then fallback to /index.html
  } # End location / block

  location /api/ { # Location block for API requests
    proxy_pass http://api:8080/api/; # Proxy requests to http://api:8080/api/ (backend API server)
    proxy_set_header Host $host; # Set Host header in proxied request to original client Host
  } # End location /api/ block

  # This location block handles requests to /hubs/ (including WebSocket upgrades)
  location /hubs/ {
    # Proxy requests to the backend API server at http://api:8080/hubs/
    proxy_pass http://api:8080/hubs/;
    # Use HTTP/1.1 for proxying (required for WebSocket support)
    proxy_http_version 1.1;
    # Pass the Upgrade header from the client (needed for WebSocket handshake)
    proxy_set_header Upgrade $http_upgrade;
    # Set the Connection header to "upgrade" to allow WebSocket upgrade
    proxy_set_header Connection "upgrade";
    # Preserve the original Host header from the client request
    proxy_set_header Host $host;
    # Set a long read timeout (3600 seconds) to keep WebSocket connections alive
    proxy_read_timeout 3600s; # keep WebSocket connections alive
  }
}
